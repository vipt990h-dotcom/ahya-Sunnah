.certBox img{display:block;width:100%;height:auto;max-width:1150px}
.nameOverlay{

  width:52%;
  text-align:center;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  line-height:1.1;
}
.dateOverlay{
  position:absolute;
  top:87.0%;
  left:16.2%;
  transform:translate(-50%,-50%);
  font-size:18px;
  font-weight:bold;
  color:#06152f;
  width:180px;
  text-align:center;
  direction:ltr;
}
@media(max-width:700px){
 .wrap{padding:6px}.controls{margin:6px;padding:10px}
 .nameOverlay{font-size:12px;top:41.0%;width:54%}
 .dateOverlay{font-size:8px;top:87.0%;left:16.2%;width:75px}
}
@media print{
 body{background:white}.controls{display:none}.wrap{padding:0}
 .certBox{box-shadow:none;max-width:100%}.certBox img{max-width:100%;width:100%}
}
</style>

<script>
function today(){
  const d=new Date();
  const dd=String(d.getDate()).padStart(2,'0');
  const mm=String(d.getMonth()+1).padStart(2,'0');
  const yy=d.getFullYear();
  return dd + ' / ' + mm + ' / ' + yy;
}
document.getElementById('dateText').textContent = today();
function setName(){
  const v=document.getElementById('name').value.trim() || localStorage.getItem('ihyaa_cert_name') || 'اسم المشاركة';

  localStorage.setItem('ihyaa_cert_name',v);
}

if(saved){document.getElementById('name').value=saved;}
setName();
